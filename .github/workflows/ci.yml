name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage gate
        # Regression floor (current ~12%); roadmap P0 target is >=60% on internal/biz.
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t >= 11.0) ? 0 : 1 }' || { echo "coverage gate failed (< 11%)"; exit 1; }
      - name: Build
        run: go build ./...

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install
      - name: Type-check & build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-gateway:ci .

  postgres-smoke:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_gateway
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build server
        working-directory: backend
        run: go build -o server ./cmd/server
      - name: Boot against PostgreSQL and probe readiness
        working-directory: backend
        env:
          AIGW_DB_DRIVER: postgres
          AIGW_DB_DSN: "host=127.0.0.1 user=postgres password=postgres dbname=ai_gateway port=5432 sslmode=disable"
          AIGW_REDIS_ADDR: "127.0.0.1:6379"
          AIGW_ADMIN_TOKEN: "ci-smoke-token"
          AIGW_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
        run: |
          ./server -conf configs/config.yaml &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/readyz > /dev/null; then ready=1; break; fi
            sleep 1
          done
          [ "${ready:-0}" = "1" ] || { echo "readyz never became ready"; exit 1; }
          # auth must be enforced
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ai/gateway/key/stats)
          [ "$code" = "401" ] || { echo "expected 401 without token, got $code"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ci-smoke-token" http://127.0.0.1:8080/ai/gateway/key/stats)
          [ "$code" = "200" ] || { echo "expected 200 with token, got $code"; exit 1; }
          echo "postgres smoke OK"
