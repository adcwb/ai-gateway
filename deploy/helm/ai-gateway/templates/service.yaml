apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels: {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "ai-gateway.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.service.httpPort }}, targetPort: http }
    - { name: metrics, port: {{ .Values.service.metricsPort }}, targetPort: metrics }
