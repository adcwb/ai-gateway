{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels: {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "ai-gateway.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 15s
{{- end }}
