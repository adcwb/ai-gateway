apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels: {{- include "ai-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  AIGW_ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required (32 bytes)" .Values.secrets.encryptionKey | quote }}
  AIGW_ADMIN_TOKEN: {{ .Values.secrets.adminToken | quote }}
  AIGW_ALERT_WEBHOOK: {{ .Values.secrets.alertWebhook | quote }}
  AIGW_DB_DSN: {{ required "config.dbDSN is required" .Values.config.dbDSN | quote }}
  AIGW_REDIS_PASSWORD: {{ .Values.config.redisPassword | quote }}
